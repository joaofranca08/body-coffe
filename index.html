<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Body Coffee | Experiência Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { coffee: { dark: '#1e1e2f', brown: '#2b1d18', orange: '#ff7b54', fire: '#ff5722' } } } }
        }
    </script>
</head>
<body class="font-body scroll-smooth main-gradient text-white overflow-x-hidden">

    <!-- Navegação Estilo App -->
    <nav class="fixed top-0 w-full z-50 glass-card px-6 py-4 flex justify-between items-center">
        <a href="#" class="font-display text-2xl font-bold">☕ Body Coffee</a>
        <button onclick="toggleCart()" class="bg-coffee-orange px-4 py-2 rounded-full font-bold shadow-lg hover:scale-110 transition">
            🛒 <span id="cart-count">0</span>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="hero" class="min-h-screen flex flex-col justify-center items-center text-center px-6 relative">
        <div class="steam-container mb-4">
            <div class="steam animate-steam"></div>
            <div class="steam animate-steam" style="animation-delay: 0.5s"></div>
        </div>
        <h1 class="font-display text-6xl md:text-8xl animate-glow mb-4">Body Coffee</h1>
        <p class="text-xl opacity-80 max-w-lg">O café mais instagramável da cidade agora na palma da sua mão.</p>
        <a href="#cardapio" class="mt-8 btn-primary px-10 py-4 rounded-full font-bold text-lg">Fazer Pedido</a>
    </section>

    <!-- Cardápio Interativo -->
    <section id="cardapio" class="py-20 px-6 max-w-6xl mx-auto">
        <h2 class="font-display text-4xl text-center mb-12">Escolha seu Favorito</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="glass-card p-8 rounded-3xl text-center hover-scale">
                <h3 class="text-2xl font-bold">Pink Latte</h3>
                <p class="text-coffee-orange font-bold text-2xl my-4">R$ 18,00</p>
                <button onclick="addToCart('Pink Latte', 18.00)" class="btn-primary w-full py-3 rounded-xl font-bold">Adicionar</button>
            </div>
            <div class="glass-card p-8 rounded-3xl text-center hover-scale">
                <h3 class="text-2xl font-bold">Cloud Cappuccino</h3>
                <p class="text-coffee-orange font-bold text-2xl my-4">R$ 22,00</p>
                <button onclick="addToCart('Cloud Cappuccino', 22.00)" class="btn-primary w-full py-3 rounded-xl font-bold">Adicionar</button>
            </div>
            <div class="glass-card p-8 rounded-3xl text-center hover-scale">
                <h3 class="text-2xl font-bold">Red Velvet Cake</h3>
                <p class="text-coffee-orange font-bold text-2xl my-4">R$ 25,00</p>
                <button onclick="addToCart('Red Velvet Cake', 25.00)" class="btn-primary w-full py-3 rounded-xl font-bold">Adicionar</button>
            </div>
        </div>
    </section>

    <!-- Sistema de Avaliações -->
    <section id="avaliacoes" class="py-20 px-6 bg-black/20">
        <div class="max-w-4xl mx-auto">
            <h2 class="font-display text-4xl text-center mb-10">O que achou?</h2>
            <div class="glass-card p-8 rounded-2xl mb-12">
                <input type="text" id="rev-name" placeholder="Seu Nome" class="input-field mb-4">
                <div class="flex gap-2 text-3xl text-yellow-500 mb-4" id="star-rating">
                    <span onclick="setStars(1)" class="cursor-pointer">★</span>
                    <span onclick="setStars(2)" class="cursor-pointer">★</span>
                    <span onclick="setStars(3)" class="cursor-pointer">★</span>
                    <span onclick="setStars(4)" class="cursor-pointer">★</span>
                    <span onclick="setStars(5)" class="cursor-pointer">★</span>
                </div>
                <textarea id="rev-text" placeholder="Deixe seu feedback..." class="input-field mb-4"></textarea>
                <button onclick="saveReview()" class="btn-primary px-8 py-3 rounded-xl font-bold">Publicar</button>
            </div>
            <div id="reviews-display" class="grid gap-4"></div>
        </div>
    </section>

    <!-- Carrinho & Pagamento -->
    <div id="cart-modal" class="fixed inset-0 bg-black/90 hidden z-50 flex items-center justify-center p-6">
        <div class="glass-card p-8 rounded-3xl w-full max-w-md relative">
            <h2 class="text-2xl font-bold mb-6">Resumo do Pedido</h2>
            <div id="cart-list" class="max-h-60 overflow-y-auto mb-6"></div>
            <div class="text-xl font-bold border-t border-white/10 pt-4 flex justify-between">
                <span>Total:</span> <span id="cart-total">R$ 0,00</span>
            </div>
            <button onclick="sendOrder()" class="w-full bg-green-600 py-4 rounded-xl font-bold mt-6 hover:bg-green-500 transition">Finalizar via WhatsApp</button>
            <button onclick="toggleCart()" class="w-full mt-4 text-white/50 text-sm">Continuar Comprando</button>
        </div>
    </div>

    <script>
        let cart = [];
        let stars = 0;

        function addToCart(name, price) {
            cart.push({name, price});
            document.getElementById('cart-count').innerText = cart.length;
            alert(name + " adicionado!");
        }

        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            modal.classList.toggle('hidden');
            const list = document.getElementById('cart-list');
            let total = 0;
            list.innerHTML = cart.map(i => {
                total += i.price;
                return `<div class="flex justify-between py-2"><span>${i.name}</span><span>R$ ${i.price.toFixed(2)}</span></div>`;
            }).join('');
            document.getElementById('cart-total').innerText = `R$ ${total.toFixed(2)}`;
        }

        function sendOrder() {
            if(cart.length === 0) return alert("Adicione itens primeiro!");
            let text = "*Novo Pedido Body Coffee*%0A%0A";
            cart.forEach(i => text += `- ${i.name}: R$ ${i.price.toFixed(2)}%0A`);
            text += `%0A*Total: ${document.getElementById('cart-total').innerText}*`;
            window.open(`https://wa.me{text}`); // TROQUE O NÚMERO AQUI
        }

        function setStars(n) {
            stars = n;
            const s = document.getElementById('star-rating').children;
            for(let i=0; i<5; i++) s[i].style.color = i < n ? '#facc15' : '#4b5563';
        }

        function saveReview() {
            const n = document.getElementById('rev-name').value;
            const t = document.getElementById('rev-text').value;
            if(!n || !t || stars === 0) return alert("Preencha tudo!");
            const rev = { n, t, stars, d: new Date().toLocaleDateString() };
            let revs = JSON.parse(localStorage.getItem('reviews') || '[]');
            revs.unshift(rev);
            localStorage.setItem('reviews', JSON.stringify(revs));
            renderReviews();
            document.getElementById('rev-name').value = '';
            document.getElementById('rev-text').value = '';
            setStars(0);
        }

        function renderReviews() {
            const display = document.getElementById('reviews-display');
            const revs = JSON.parse(localStorage.getItem('reviews') || '[]');
            display.innerHTML = revs.map(r => `
                <div class="glass-card p-6 rounded-xl border-l-4 border-coffee-orange">
                    <div class="flex justify-between font-bold"><span>${r.n}</span><span class="text-yellow-500">${'★'.repeat(r.stars)}</span></div>
                    <p class="opacity-80 mt-2">${r.t}</p>
                </div>
            `).join('');
        }
        window.onload = renderReviews;
    </script>
</body>
</html>
