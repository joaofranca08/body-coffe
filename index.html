<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Body Coffee</title>
    
    <!-- Scripts Externos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com"></script>
    
    <!-- Fontes -->
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    
    <!-- Link para o CSS Externo -->
    <link rel="stylesheet" href="style.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        coffee: {
                            dark: '#1e1e2f',
                            brown: '#2b1d18',
                            orange: '#ff7b54',
                            fire: '#ff5722',
                            gold: '#ffb400'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="font-body scroll-smooth h-full overflow-x-hidden overflow-y-auto main-gradient">
    
    <!-- Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 glass-card" id="navbar">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="#hero" class="flex items-center gap-2">
                <span class="text-3xl">☕</span>
                <span id="nav-brand" class="font-display text-xl font-bold text-white">Body Coffee</span>
            </a>
            <div class="hidden md:flex items-center gap-8">
                <a href="#hero" class="nav-link text-white/80 hover:text-white transition-colors">Início</a>
                <a href="#numeros" class="nav-link text-white/80 hover:text-white transition-colors">Números</a>
                <a href="#cardapio" class="nav-link text-white/80 hover:text-white transition-colors">Cardápio</a>
                <a href="#historia" class="nav-link text-white/80 hover:text-white transition-colors">História</a>
                <a href="#carrinho" class="nav-link text-white/80 hover:text-white transition-colors">Carrinho</a>
                <a href="#avaliacoes" class="nav-link text-white/80 hover:text-white transition-colors">Avaliações</a>
                <a href="#contato" class="nav-link text-white/80 hover:text-white transition-colors">Contato</a>
            </div>
            <button id="mobile-menu-btn" class="md:hidden text-white text-2xl">☰</button>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="hero" class="hero-section min-h-screen flex flex-col justify-center items-center text-center relative overflow-hidden px-6">
        <!-- Floating Coffee Beans -->
        <div class="absolute inset-0 pointer-events-none overflow-hidden">
            <div class="absolute top-20 left-10 text-4xl animate-float" style="animation-delay: 0s;">🫘</div>
            <div class="absolute top-40 right-20 text-3xl animate-float" style="animation-delay: 1s;">🫘</div>
            <div class="absolute bottom-40 left-20 text-5xl animate-float" style="animation-delay: 2s;">🫘</div>
            <div class="absolute bottom-20 right-10 text-4xl animate-float" style="animation-delay: 0.5s;">🫘</div>
        </div>

        <div class="relative mb-8">
            <div class="steam-container flex gap-2">
                <div class="steam animate-steam" style="animation-delay: 0s;"></div>
                <div class="steam animate-steam" style="animation-delay: 0.4s;"></div>
                <div class="steam animate-steam" style="animation-delay: 0.8s;"></div>
            </div>
            <span class="text-8xl">☕</span>
        </div>

        <h1 id="hero-title" class="font-display text-5xl md:text-7xl font-bold text-white animate-glow mb-4">Body Coffee</h1>
        <p id="hero-tagline" class="text-xl md:text-2xl text-white/80 mb-8 max-w-lg">O café mais instagramável da cidade</p>
        
        <div class="flex flex-col sm:flex-row gap-4">
            <a href="#cardapio" class="btn-primary px-8 py-4 rounded-full text-white font-semibold text-lg transition-all duration-300 hover:scale-105 hover:shadow-lg hover:shadow-orange-500/30">
                Ver Cardápio
            </a>
            <a href="#contato" class="px-8 py-4 border border-white/30 rounded-full text-white font-semibold text-lg hover:bg-white/10 transition-all">
                Contato
            </a>
        </div>
    </section>

</body>
</html>
