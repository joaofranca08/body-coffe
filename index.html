<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Body Coffee</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- CSS externo -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="text-4xl mb-6 text-center">☕ Body Coffee</h1>

<!-- CARDÁPIO -->
<div class="grid md:grid-cols-3 gap-4 mb-10">

  <div class="glass">
    <h2>Espresso</h2>
    <p>R$ 8</p>
    <button class="btn" onclick="addToCart('Espresso',8)">+</button>
  </div>

  <div class="glass">
    <h2>Cappuccino</h2>
    <p>R$ 14</p>
    <button class="btn" onclick="addToCart('Cappuccino',14)">+</button>
  </div>

  <div class="glass">
    <h2>Mocha</h2>
    <p>R$ 18</p>
    <button class="btn" onclick="addToCart('Mocha',18)">+</button>
  </div>

</div>

<!-- CARRINHO -->
<div class="glass mb-10">
  <h2 class="text-2xl mb-4">🛒 Carrinho</h2>
  <div id="cart-items"></div>
  <p class="mt-4">Total: <span id="total">R$ 0</span></p>
  <button class="btn mt-4" onclick="checkout()">Finalizar Pedido</button>
</div>

<!-- AVALIAÇÕES -->
<div class="glass mb-10">
  <h2 class="text-2xl mb-4">⭐ Avaliações</h2>

  <form id="review-form" class="mb-4">
    <input id="name" placeholder="Nome" class="text-black p-2 w-full mb-2">
    <input id="rating" type="number" max="5" min="1" placeholder="Nota (1-5)" class="text-black p-2 w-full mb-2">
    <textarea id="comment" placeholder="Comentário" class="text-black p-2 w-full mb-2"></textarea>
    <button class="btn w-full">Enviar</button>
  </form>

  <p>Média: <span id="avg">0.0</span></p>
  <div id="reviews"></div>
</div>

<script>
// ================= STORAGE =================
function get(key){
  return JSON.parse(localStorage.getItem(key)) || []
}

function set(key,data){
  localStorage.setItem(key, JSON.stringify(data))
}

// ================= CARRINHO =================
let cart = []

function addToCart(name,price){
  cart.push({name,price})
  renderCart()
}

function renderCart(){
  const el = document.getElementById("cart-items")
  el.innerHTML = ""

  let total = 0

  cart.forEach(item=>{
    total += item.price
    el.innerHTML += `<p>${item.name} - R$ ${item.price}</p>`
  })

  document.getElementById("total").innerText = "R$ "+total.toFixed(2)
}

function checkout(){
  let orders = get("orders")
  orders.push(cart)
  set("orders",orders)

  alert("Pedido realizado!")

  cart = []
  renderCart()
}

// ================= AVALIAÇÕES =================
let reviews = get("reviews")

function renderReviews(){
  const el = document.getElementById("reviews")
  el.innerHTML = ""

  if(reviews.length === 0){
    el.innerHTML = "<p>Sem avaliações ainda</p>"
    return
  }

  reviews.forEach((r,i)=>{
    el.innerHTML += `
      <div class="mt-2">
        <strong>${r.name}</strong> (${r.rating}⭐)
        <p>${r.comment}</p>
        <button onclick="del(${i})">❌</button>
      </div>
    `
  })

  updateAvg()
}

function updateAvg(){
  const avg = reviews.reduce((a,b)=>a+b.rating,0)/reviews.length
  document.getElementById("avg").innerText = avg.toFixed(1)
}

function del(i){
  reviews.splice(i,1)
  set("reviews",reviews)
  renderReviews()
}

// ================= FORM =================
document.getElementById("review-form").addEventListener("submit",e=>{
  e.preventDefault()

  const name = document.getElementById("name").value
  const rating = parseInt(document.getElementById("rating").value)
  const comment = document.getElementById("comment").value

  reviews.push({name,rating,comment})
  set("reviews",reviews)

  e.target.reset()
  renderReviews()
})

// INIT
renderReviews()
</script>

</body>
</html>
